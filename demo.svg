<svg width="680" height="420" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      .bg { fill: #0d0d0d; }
      .term { font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 12px; }
      .dim { fill: #444; }
      .green { fill: #00ff88; }
      .red { fill: #ff4466; }
      .yellow { fill: #ffcc00; }
      .blue { fill: #4488ff; }
      .white { fill: #e0e0e0; }
      .cyan { fill: #00ccff; }
      .orange { fill: #ff8844; }
      .dot-red { fill: #ff5f57; }
      .dot-yellow { fill: #febc2e; }
      .dot-green { fill: #28c840; }

      .line1 { animation: fadein 0.3s 0.2s both; }
      .line2 { animation: fadein 0.3s 0.5s both; }
      .line3 { animation: fadein 0.3s 0.8s both; }
      .line4 { animation: fadein 0.3s 1.1s both; }
      .line5 { animation: fadein 0.3s 1.4s both; }
      .line6 { animation: fadein 0.3s 1.7s both; }
      .line7 { animation: fadein 0.3s 2.0s both; }
      .line8 { animation: fadein 0.3s 2.3s both; }
      .line9 { animation: fadein 0.3s 2.6s both; }
      .line10 { animation: fadein 0.3s 2.9s both; }
      .line11 { animation: fadein 0.3s 3.2s both; }
      .line12 { animation: fadein 0.3s 3.5s both; }
      .line13 { animation: fadein 0.3s 3.8s both; }
      .line14 { animation: fadein 0.3s 4.1s both; }
      .line15 { animation: fadein 0.3s 4.4s both; }
      .line16 { animation: fadein 0.3s 4.7s both; }
      .line17 { animation: fadein 0.3s 5.0s both; }
      .line18 { animation: fadein 0.3s 5.3s both; }
      .line19 { animation: fadein 0.3s 5.6s both; }
      .cursor { animation: blink 1s infinite; }

      @keyframes fadein {
        from { opacity: 0; transform: translateX(-4px); }
        to { opacity: 1; transform: translateX(0); }
      }
      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }

      .rebate-bar { animation: grow 1s 4.5s both; transform-origin: left; }
      @keyframes grow {
        from { transform: scaleX(0); }
        to { transform: scaleX(1); }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="680" height="420" rx="12" class="bg"/>
  <!-- Title bar -->
  <rect width="680" height="36" rx="12" fill="#1a1a1a"/>
  <rect y="24" width="680" height="12" fill="#1a1a1a"/>
  <circle cx="20" cy="18" r="6" class="dot-red"/>
  <circle cx="40" cy="18" r="6" class="dot-yellow"/>
  <circle cx="60" cy="18" r="6" class="dot-green"/>
  <text x="340" y="23" text-anchor="middle" class="term dim" font-size="11">hotstuff_mm_bot.py — mainnet</text>

  <!-- Content -->
  <g transform="translate(20, 56)">

    <!-- Banner -->
    <g class="line1">
      <text class="term red" font-weight="bold">╔══════════════════════════════════════════════════════╗</text>
    </g>
    <g class="line2" transform="translate(0,16)">
      <text class="term red" font-weight="bold">║   🔴  HOTSTUFF MAINNET MM Bot v4.0                   ║</text>
    </g>
    <g class="line3" transform="translate(0,32)">
      <text class="term red" font-weight="bold">╚══════════════════════════════════════════════════════╝</text>
    </g>

    <g class="line4" transform="translate(0,52)">
      <text class="term white">Confirm to start [yes/no]: </text>
      <text class="term green" x="330">yes</text>
    </g>

    <g class="line5" transform="translate(0,70)">
      <text class="term dim">════════════════════════════════════════════════════</text>
    </g>
    <g class="line6" transform="translate(0,86)">
      <text class="term cyan">📡 Startup position sync...</text>
    </g>
    <g class="line7" transform="translate(0,102)">
      <text class="term green">✅ Position sync done (0 symbols)</text>
    </g>
    <g class="line8" transform="translate(0,118)">
      <text class="term green">🚀 Market making started (v4.0)...</text>
    </g>

    <!-- Cycle -->
    <g class="line9" transform="translate(0,138)">
      <text class="term dim">═══════════════════════════════════════════════════════</text>
    </g>
    <g class="line10" transform="translate(0,154)">
      <text class="term white">Cycle #1 | Daily loss: </text>
      <text class="term green" x="168">$0.00</text>
      <text class="term white" x="210"> | PnL: </text>
      <text class="term green" x="252">+$0.00</text>
      <text class="term white" x="306"> | Vol: </text>
      <text class="term yellow" x="342">$0</text>
    </g>
    <g class="line11" transform="translate(0,170)">
      <text class="term blue">── BTC-PERP | Mid: $67,842 | Pos: $0 | Spread: 3.0bps | Skew: +0.00bps</text>
    </g>
    <g class="line12" transform="translate(0,186)">
      <text class="term blue">── ETH-PERP | Mid: $1,977  | Pos: $0 | Spread: 3.0bps | Skew: +0.00bps</text>
    </g>

    <!-- Fill event -->
    <g class="line13" transform="translate(0,206)">
      <text class="term dim">───────────────────────────────────────────</text>
    </g>
    <g class="line14" transform="translate(0,222)">
      <text class="term green" font-weight="bold">✅ FILL  BTC-PERP  openShort  $199.84  maker rebate: +$0.0050</text>
    </g>
    <g class="line15" transform="translate(0,238)">
      <text class="term green" font-weight="bold">✅ FILL  ETH-PERP  openLong   $199.91  maker rebate: +$0.0050</text>
    </g>

    <!-- Stats -->
    <g class="line16" transform="translate(0,258)">
      <text class="term dim">═══════════════════════════════════════════════════════</text>
    </g>
    <g class="line17" transform="translate(0,274)">
      <text class="term white">Cycle #8 | Daily loss: </text>
      <text class="term green" x="168">$0.00</text>
      <text class="term white" x="210"> | PnL: </text>
      <text class="term green" x="252">+$0.04</text>
      <text class="term white" x="306"> | Vol: </text>
      <text class="term yellow" x="342">$3,198</text>
    </g>
    <g class="line18" transform="translate(0,290)">
      <text class="term cyan">   BTC-PERP net_pos: </text>
      <text class="term red" x="158">-$200</text>
      <text class="term white" x="196">  (SHORT)</text>
    </g>
    <g class="line19" transform="translate(0,306)">
      <text class="term cyan">   ETH-PERP net_pos: </text>
      <text class="term green" x="158">+$200</text>
      <text class="term white" x="196">  (LONG)</text>
    </g>

    <!-- Cursor -->
    <g transform="translate(0,326)">
      <text class="term green">$ </text>
      <rect x="14" y="-12" width="8" height="14" fill="#00ff88" class="cursor"/>
    </g>

    <!-- Rebate bar bottom -->
    <g transform="translate(0,352)">
      <text class="term dim" font-size="11">Maker rebate  </text>
      <rect x="100" y="-10" width="200" height="12" rx="2" fill="#1a1a1a"/>
      <rect x="100" y="-10" width="200" height="12" rx="2" fill="#00ff4422"/>
      <rect x="100" y="-10" width="80" height="12" rx="2" fill="#00ff88" class="rebate-bar"/>
      <text class="term green" font-size="11" x="308">+$11.05/day</text>
    </g>

  </g>
</svg>
